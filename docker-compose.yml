services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modaflow}
      POSTGRES_USER: ${POSTGRES_USER:-modaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modaflow}
    volumes:
      - modaflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modaflow} -d ${POSTGRES_DB:-modaflow}"]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://modaflow:modaflow@db:5432/modaflow}
      SECRET_KEY: ${SECRET_KEY:-modaflow-dev-secret-change-me-0123456789abcdef}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-ModaFlow2026!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  modaflow_db:
